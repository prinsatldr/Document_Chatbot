<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body
    class="bg-light"
>

    <div
        class="container vh-100 d-flex justify-content-center align-items-center"
    >

        <div
            class="card shadow p-4"
            style="width:400px;"
        >

            <h2
                class="text-center mb-4"
            >
                Admin Login
            </h2>
            {% with messages = get_flashed_messages() %}

    {% if messages %}

        <div
            class="alert alert-danger"
        >

            {{ messages[0] }}

        </div>

    {% endif %}

{% endwith %}
            <form
                action="/login"
                method="POST"
            >

                <div
                    class="mb-3"
                >

                    <label
                        class="form-label"
                    >
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                    >

                </div>

                <div
                    class="mb-3"
                >

                    <label
                        class="form-label"
                    >
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100"
                >
                    Login
                </button>

            </form>

        </div>

    </div>

</body>

</html>
