<!DOCTYPE html>
<html>

<head>

    <title>AI Assistant</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for(
            'static',
            filename='css/chat.css'
        ) }}"
    >

</head>

<body>

    <div id="chatBox">

        <div class="chat-header">

    <div class="header-top">

            <h1>AI Assistant</h1>

            <button
                id="closeChat"
                type="button"
            >
                ✕
            </button>

        </div>

        <p>
            How can I help you today?
        </p>

    </div>

            <div
                class="chat-container"
                id="chatContainer"
            >

                {% if chat_history %}

                    {% for msg in chat_history %}

                        {% if msg.role == "user" %}

                            <div class="message user">

                                <div class="bubble">

                                    {{ msg.content }}

                                </div>

                            </div>

                        {% else %}

                            <div class="message bot">

                                <div class="bubble">

                                    {{ msg.content }}

                                </div>

                            </div>

                        {% endif %}

                    {% endfor %}

                {% endif %}

            </div>
            <div
            id="loading"
            class="message bot"
            style="display:none;"
        >

            <div class="typing-bubble">

                <span></span>
                <span></span>
                <span></span>

            </div>

        </div>
            <div
                id="loading"
                class="typing-indicator"
            >

                <div class="typing-bubble">

                    <span></span>
                    <span></span>
                    <span></span>

                </div>

            </div>

            <form
                id="chatForm"
                action="/search"
                method="POST"
            >

                <div class="input-area">
                    <p id="recordStatus"></p>
                    <input
                    id="question"
                    type="text"
                    name="question"
                    placeholder="Ask anything..."
                    required
                >

                <button
                    type="button"
                    id="startRecord"
                >
                    🎙️
                </button>

                <button
                    type="button"
                    id="stopRecord">
                    ⏹
                </button>

                <button
                    type="submit">
                    Send
                </button>

                </div>

            </form>

          </form>

<div
    id="transcriptPreview"
    style="display:none;"
>

    <div class="bubble">

        <strong>
            🎤 Transcript
        </strong>

        <p id="previewText"></p>

        <button
            id="sendVoice"
            type="button"
        >
            ✅ Send
        </button>

        <button
            id="cancelVoice"
            type="button"
        >
            ❌ Cancel
        </button>

    </div>

    </div>

    <form
        action="/clear_chat"
        method="POST"
        class="mt-2"
    >

                <button
                    type="submit"
                    class="btn btn-danger"
                >

                    Clear Chat

                </button>

            </form>

        </div>

    </div>

    <div id="chatWidget">

        💬

    </div>

    <script
        src="{{ url_for(
            'static',
            filename='js/chat.js'
        ) }}"
    ></script>

</body>

</html>
