<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Document Manager</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for(
            'static',
            filename='css/upload.css'
        ) }}"
    >

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

        <div class="container-fluid">

            <div>

                <a
                    href="/"
                    class="btn btn-outline-light me-2"
                >
                    Documents
                </a>

                <a
                    href="/chat"
                    class="btn btn-light"
                >
                    Chat
                </a>

            </div>

        </div>

    </nav>

    <div class="container">

        <div class="header-card">

            <h1> Document Manager</h1>

            <p>
                Upload, manage and organize your PDF documents
            </p>

        </div>

        <div class="upload-card">

            <form
                action="/upload"
                method="POST"
                enctype="multipart/form-data"
            >

                <input
                    type="file"
                    name="document"
                    required
                >

                <button
                    type="submit"
                >
                    Upload PDF
                </button>

            </form>

        </div>

        <div class="documents-card">

            <h2>

                Uploaded Documents

                ({{ documents|length if documents else 0 }})

            </h2>

            {% if documents %}

                {% for doc in documents %}

                    <div class="document-row">

                        <span>

                            📄 {{ doc[1] }}

                        </span>

                        <div>

                            <a
                                class="view-btn"
                                href="/uploads/{{ doc[1] }}"
                                target="_blank"
                            >
                                View
                            </a>

                            <a
                                class="delete-btn"
                                href="/delete/{{ doc[0] }}"
                                onclick="return confirm('Delete this document?')"
                            >
                                Delete
                            </a>

                        </div>

                    </div>

                {% endfor %}

            {% else %}

                <p>

                    No documents uploaded.

                </p>

            {% endif %}

        </div>

    </div>

</body>

</html>
